<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1A2F"/>
      <stop offset="100%" stop-color="#02050D"/>
    </radialGradient>
    <!-- 发光文字渐变 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#4D80FF"/>
    </linearGradient>
    <!-- 山脉渐变 -->
    <linearGradient id="mtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0.3"/>
    </linearGradient>
    <!-- 外圈光晕滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆形底板 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1E3A5F" stroke-width="3"/>
  
  <!-- 外圈科技环 -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.6"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1E3A5F" stroke-width="1"/>
  
  <!-- 内部数据网格（科幻感） -->
  <g opacity="0.15" stroke="#00E5FF" stroke-width="0.8">
    <line x1="100" y1="256" x2="412" y2="256"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="140" y1="140" x2="372" y2="372"/>
    <line x1="372" y1="140" x2="140" y2="372"/>
    <circle cx="256" cy="256" r="180" fill="none"/>
    <circle cx="256" cy="256" r="120" fill="none"/>
  </g>

  <!-- ========== 山脉轮廓（中国元素 + 科幻折线） ========== -->
  <path d="M 100 380 L 150 330 L 200 350 L 256 280 L 310 320 L 360 260 L 410 300 L 420 380 Z" 
        fill="none" stroke="url(#mtGrad)" stroke-width="4" filter="url(#glow)"/>
  <!-- 山脉内部填充半透明 -->
  <path d="M 100 380 L 150 330 L 200 350 L 256 280 L 310 320 L 360 260 L 410 300 L 420 380 Z" 
        fill="#00E5FF" opacity="0.1"/>
  <!-- 山脉上的光点（科幻数据点） -->
  <circle cx="150" cy="330" r="3" fill="#00FFFF" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="4" fill="#00FFFF" filter="url(#glow)"/>
  <circle cx="360" cy="260" r="3" fill="#00FFFF" filter="url(#glow)"/>

  <!-- ========== “昆”字（左侧） ========== -->
  <g transform="translate(100, 140)" fill="url(#textGrad)" filter="url(#glow)">
    <!-- 日字部（上方） -->
    <path d="M 0 0 L 60 0 L 55 20 L 5 20 Z" fill="none" stroke="currentColor" stroke-width="4"/>
    <path d="M 5 5 L 55 5" stroke="currentColor" stroke-width="3"/>
    <path d="M 5 15 L 55 15" stroke="currentColor" stroke-width="3"/>
    <!-- 比部（下方） -->
    <path d="M 10 25 L 50 25 L 40 45 L 30 65 L 20 45 Z" fill="none" stroke="currentColor" stroke-width="4"/>
    <!-- 科幻连接线 -->
    <path d="M 30 45 L 30 80 L 20 95" stroke="#00E5FF" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M 30 45 L 40 75 L 50 95" stroke="#00E5FF" stroke-width="2" fill="none" opacity="0.8"/>
    <!-- 底部光点 -->
    <circle cx="20" cy="98" r="3" fill="#FF00AA"/>
    <circle cx="50" cy="98" r="3" fill="#FF00AA"/>
  </g>

  <!-- ========== “仑”字（右侧） ========== -->
  <g transform="translate(310, 140)" fill="url(#textGrad)" filter="url(#glow)">
    <!-- 人字头 -->
    <path d="M 0 0 L 35 25 L 70 0" fill="none" stroke="currentColor" stroke-width="5"/>
    <!-- 匕部变形 -->
    <path d="M 15 30 L 55 30 L 45 60 L 25 60 Z" fill="none" stroke="currentColor" stroke-width="4"/>
    <path d="M 35 30 L 35 75" stroke="currentColor" stroke-width="3"/>
    <!-- 科幻能量箭头 -->
    <path d="M 35 75 L 25 95" stroke="#00E5FF" stroke-width="2" fill="none"/>
    <path d="M 35 75 L 45 95" stroke="#00E5FF" stroke-width="2" fill="none"/>
    <polygon points="30,100 40,100 35,110" fill="#FF00AA" opacity="0.9"/>
  </g>

  <!-- ========== 中心神秘能量球（昆仑天眼） ========== -->
  <circle cx="256" cy="210" r="18" fill="#00E5FF" opacity="0.3" filter="url(#glow)"/>
  <circle cx="256" cy="210" r="8" fill="#FFFFFF"/>
  <circle cx="256" cy="210" r="3" fill="#FF00AA"/>

  <!-- 顶部中国印章（可选） -->
  <rect x="220" y="48" width="72" height="24" rx="4" fill="#B3002D" opacity="0.8"/>
  <text x="256" y="65" font-family="'SimHei', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FFD700" text-anchor="middle" font-weight="bold">昆仑</text>

  <!-- 底部装饰（云纹抽象 + 数据线） -->
  <path d="M 180 430 Q 200 420 220 430 T 260 430 T 300 430 T 340 430" fill="none" stroke="#1E3A5F" stroke-width="2"/>
  <path d="M 180 440 Q 200 430 220 440 T 260 440 T 300 440 T 340 440" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
</svg>